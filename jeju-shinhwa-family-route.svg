<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-label="제주 신화월드 3박4일 이동 동선 상세 지도">
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8f6ff"/>
      <stop offset="1" stop-color="#fff4db"/>
    </linearGradient>
    <linearGradient id="island" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dff5df"/>
      <stop offset="0.55" stop-color="#bfe6c4"/>
      <stop offset="1" stop-color="#f5e0ad"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="125%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#1f2d3d" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#f97316"/>
    </marker>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;fill:#203043}
      .title{font-size:46px;font-weight:900;letter-spacing:-1.4px}.sub{font-size:18px;font-weight:800;fill:#607083}
      .seaLabel{font-size:18px;font-weight:900;fill:#5d87a8;letter-spacing:.12em}.region{font-size:16px;font-weight:900;fill:#5b6b7c}.road{fill:none;stroke:#ffffff;stroke-width:11;stroke-linecap:round;stroke-linejoin:round;opacity:.84}.road2{fill:none;stroke:#95a88b;stroke-width:3;stroke-linecap:round;stroke-dasharray:6 10;opacity:.72}.route{fill:none;stroke:#f97316;stroke-width:8;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:1 17;marker-end:url(#arrow)}.route2{fill:none;stroke:#22c55e;stroke-width:7;stroke-linecap:round;stroke-dasharray:1 16;marker-end:url(#arrow)}.pinText{font-size:20px;font-weight:900}.pinSmall{font-size:14px;font-weight:800;fill:#596879}.badge{font-size:16px;font-weight:900;fill:#fff}.cardTitle{font-size:22px;font-weight:900}.cardText{font-size:16px;font-weight:800;fill:#334155}.tiny{font-size:13px;font-weight:800;fill:#64748b}.pill{font-size:16px;font-weight:900;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="1050" rx="36" fill="url(#sea)"/>
  <text class="title" x="64" y="74">제주 신화월드 3박4일 이동 동선</text>
  <text class="sub" x="66" y="112">서쪽·남서쪽 중심 일정 · 식사 미정 구간과 티켓 메모 반영</text>
  <rect x="1216" y="46" width="292" height="54" rx="27" fill="#1f2d3d" filter="url(#shadow)"/>
  <text class="pill" x="1248" y="80">DAY 2/3 식사 미정 반영</text>

  <text class="seaLabel" x="152" y="226">제주시 / 공항권</text>
  <text class="seaLabel" x="950" y="820">서귀포·중문권</text>
  <text class="region" x="740" y="486">한라산</text>

  <path d="M170 438 C220 318 360 258 525 236 C690 212 840 228 1005 256 C1180 286 1320 360 1370 462 C1424 574 1370 682 1240 750 C1110 820 915 840 735 820 C520 796 360 742 242 650 C160 586 132 506 170 438 Z" fill="url(#island)" stroke="#1f2d3d" stroke-width="5" filter="url(#shadow)"/>
  <path d="M720 430 C770 386 846 396 886 448 C932 508 884 582 806 590 C724 598 666 520 720 430 Z" fill="#8bc681" stroke="#618a5d" stroke-width="3" opacity=".72"/>
  <path class="road" d="M314 382 C450 330 625 312 810 326 C1000 340 1160 392 1250 482 C1164 570 1018 620 846 646 C662 676 488 638 360 560 C292 520 282 454 314 382 Z"/>
  <path class="road2" d="M322 542 C510 548 700 548 900 572 C1040 588 1168 640 1248 704"/>
  <path class="road2" d="M502 694 C560 610 650 552 808 508 C964 464 1082 414 1208 362"/>

  <!-- Route first, labels later: no text overlap -->
  <path class="route" d="M356 336 C330 410 332 500 430 596 C504 668 580 700 672 700"/>
  <path class="route" d="M672 700 C616 642 596 566 646 482 C710 376 874 340 1048 370"/>
  <path class="route" d="M1048 370 C910 450 772 566 672 700"/>
  <path class="route" d="M672 700 C874 742 1068 696 1200 626"/>
  <path class="route" d="M1200 626 C914 698 610 662 356 336"/>
  <path class="route2" d="M672 700 C646 662 642 620 668 578 C704 520 780 512 822 558 C870 610 812 682 672 700"/>

  <!-- Label cards -->
  <g transform="translate(220 210)">
    <rect width="280" height="112" rx="22" fill="#ffffff" stroke="#1f2d3d" stroke-width="4"/>
    <circle cx="34" cy="34" r="19" fill="#ef4444"/><text class="badge" x="28" y="40">1</text>
    <text class="pinText" x="64" y="38">제주공항</text><text class="pinSmall" x="64" y="66">11:25 도착 · 쏘카 렌트</text><text class="pinSmall" x="64" y="91">DAY 4 17:35 출발</text>
  </g>
  <line x1="356" y1="336" x2="330" y2="322" stroke="#1f2d3d" stroke-width="3"/>

  <g transform="translate(252 620)">
    <rect width="330" height="124" rx="22" fill="#fff7ed" stroke="#1f2d3d" stroke-width="4"/>
    <circle cx="34" cy="34" r="19" fill="#f59e0b"/><text class="badge" x="28" y="40">2</text>
    <text class="pinText" x="64" y="38">제주미담 → 오설록</text><text class="pinSmall" x="64" y="66">DAY 1 점심 · 녹차밭/카페</text><text class="pinSmall" x="64" y="92">이후 신화월드 체크인</text>
  </g>
  <line x1="430" y1="596" x2="404" y2="620" stroke="#1f2d3d" stroke-width="3"/>

  <g transform="translate(565 748)">
    <rect width="370" height="126" rx="22" fill="#f3e8ff" stroke="#1f2d3d" stroke-width="4"/>
    <circle cx="36" cy="36" r="21" fill="#7c3aed"/><text class="badge" x="30" y="42">3</text>
    <text class="pinText" x="68" y="40">제주 신화월드</text><text class="pinSmall" x="68" y="68">숙소 · 테마파크 · 워터파크</text><text class="pinSmall" x="68" y="96">DAY 2 점심/저녁 미정</text>
  </g>
  <line x1="672" y1="700" x2="700" y2="748" stroke="#1f2d3d" stroke-width="3"/>

  <g transform="translate(1015 258)">
    <rect width="330" height="120" rx="22" fill="#ecfdf5" stroke="#1f2d3d" stroke-width="4"/>
    <circle cx="34" cy="34" r="19" fill="#10b981"/><text class="badge" x="28" y="40">4</text>
    <text class="pinText" x="64" y="38">유리바닥보트</text><text class="pinSmall" x="64" y="66">DAY 3 오전 외부 이동</text><text class="pinSmall" x="64" y="92">점심 초로 → 워터파크</text>
  </g>
  <line x1="1048" y1="370" x2="1058" y2="378" stroke="#1f2d3d" stroke-width="3"/>

  <g transform="translate(1130 638)">
    <rect width="330" height="124" rx="22" fill="#fefce8" stroke="#1f2d3d" stroke-width="4"/>
    <circle cx="34" cy="34" r="19" fill="#eab308"/><text class="badge" x="28" y="40">5</text>
    <text class="pinText" x="64" y="38">뽀로로 → 송도옥</text><text class="pinSmall" x="64" y="66">DAY 4 티켓은 쿠팡 비교</text><text class="pinSmall" x="64" y="92">15:30 공항 도착 목표</text>
  </g>
  <line x1="1200" y1="626" x2="1194" y2="638" stroke="#1f2d3d" stroke-width="3"/>

  <g transform="translate(74 790)">
    <rect width="412" height="130" rx="22" fill="#ffffff" stroke="#1f2d3d" stroke-width="3"/>
    <text class="cardTitle" x="24" y="40">읽는 법</text>
    <circle cx="32" cy="70" r="7" fill="#f97316"/><text class="tiny" x="48" y="75">주황 점선: 실제 외부 이동 동선</text>
    <circle cx="32" cy="100" r="7" fill="#22c55e"/><text class="tiny" x="48" y="105">초록 점선: 신화월드 내부 반복 이동</text>
  </g>

  <g transform="translate(1130 140)">
    <rect width="330" height="74" rx="20" fill="#1f2d3d"/>
    <text class="pill" x="26" y="32">현재 미정</text>
    <text class="pill" x="26" y="56">DAY 2 점심·저녁 / DAY 3 저녁</text>
  </g>
</svg>
